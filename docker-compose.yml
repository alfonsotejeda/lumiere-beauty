version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: lumiere-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7
    container_name: lumiere-valkey
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lumiere-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongodb
      - valkey
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lumiere-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongo_data:
